root = "/workspace/backend"
tmp_dir = "/tmp/air"

[build]
cmd = "CGO_ENABLED=0 go build -buildvcs=false -o /tmp/air/sub2api-server ./cmd/server"
bin = "/tmp/air/sub2api-server"
full_bin = "/tmp/air/sub2api-server"
include_ext = ["go", "sql", "yaml", "yml"]
exclude_dir = ["bin", "tmp", "vendor"]
exclude_regex = ["_test.go"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true
